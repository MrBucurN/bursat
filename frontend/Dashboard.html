<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bursat - Mesajlaşma ve Ayarlar</title>
    <script>
        (function () {
            const savedTheme = localStorage.getItem('login-theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="Dashboard.css">
</head>
<body>

    <div class="bursat-container" id="bursat-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="bursat-logo"><span>✦</span> Bursat</div>
                <button class="logout-btn" id="logout-button">Çıkış</button>
            </div>

            <div class="friend-add-area">
                <form id="friend-form">
                    <input type="text" id="friend-username-input" placeholder="Kullanıcı adı ile arkadaş ekle..." autocomplete="off" required>
                    <button type="submit">Ekle</button>
                </form>
            </div>

            <div class="requests-section" id="requests-box" style="display: none;">
                <div class="requests-title">Gelen İstekler 🔔</div>
                <div id="dynamic-requests-list"></div>
            </div>
            
            <div class="chat-list-title">Arkadaşlarım 💬</div>
            <div class="chat-list" id="dynamic-chat-list">
                </div>

            <div class="sidebar-profile-footer" id="open-settings-btn">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=default" class="avatar-img" id="my-footer-avatar" alt="Profil">
                <div class="profile-footer-info">
                    <div class="profile-footer-name" id="my-footer-name">Yükleniyor...</div>
                    <div class="profile-footer-status" id="my-footer-status">Durum ayarlanmadı</div>
                </div>
                <div class="settings-gear-icon">⚙️</div>
            </div>
        </aside>

        <main class="chat-area" id="chat-main-area">
            <div class="chat-header">
                <button type="button" class="mobile-back-btn" id="mobile-back-btn" aria-label="Sohbet listesine dön">‹</button>
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=placeholder" class="avatar-img" id="active-avatar-img" style="display:none;">
                <div class="avatar" id="active-avatar">?</div>
                <div class="chat-header-info">
                    <div class="chat-name" id="active-chat-title">Bir sohbet seçin</div>
                    <div class="chat-status" id="active-chat-status">Bursat Mesajlaşma</div>
                </div>
            </div>

            <div class="messages-container" id="messages-box">
                <div class="message incoming" style="align-self: center; border-radius: 12px; font-size: 0.85rem; background: var(--input-bg); opacity: 0.7;">
                    Sohbete başlamak için soldan bir arkadaş seçin veya sağ alttaki ⚙️ simgesinden profilinizi düzenleyin!
                </div>
            </div>

            <form class="chat-input-area" id="chat-form">
                <input type="text" class="message-input" id="msg-input" placeholder="Mesajınızı yazın..." autocomplete="off" required>
                <button type="submit" class="send-btn">➔</button>
            </form>
        </main>

        <main class="chat-area settings-area" id="settings-main-area" style="display: none;">
            <div class="settings-card">
                <h2 class="settings-title">Profil Ayarları ⚙️</h2>
                
                <form id="settings-form">
                    <div class="settings-field">
                        <label class="settings-label">Profil Resmi Linki (URL)</label>
                        <input type="text" id="set-avatar-url" class="message-input settings-input" placeholder="Örn: https://resim.linki/resim.jpg">
                        <small class="settings-help">Boş bırakırsanız otomatik robot resmi atanır.</small>
                    </div>

                    <div class="settings-field">
                        <label class="settings-label">Durum Yazısı</label>
                        <input type="text" id="set-status-text" class="message-input settings-input" placeholder="Örn: Meşgul, Kod yazıyor...">
                    </div>

                    <div class="settings-actions">
                        <button type="submit" class="settings-save-btn">Kaydet</button>
                        <button type="button" id="close-settings-btn" class="settings-close-btn">Kapat</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
