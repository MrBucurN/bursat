<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <script>
        (function () {
            const savedTheme = localStorage.getItem('login-theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Temayı değiştir">
        <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">☀️</span>
        <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">🌙</span>
        <span class="theme-toggle__text">Aydınlık tema</span>
    </button>

    <main class="login-container">
        <section class="login-card" aria-labelledby="login-title">
            <header class="login-header">
                <div class="login-logo" aria-hidden="true">✦</div>
                <h1 id="login-title">Hoş geldiniz</h1>
                <p>Hesabınıza giriş yaparak devam edin.</p>
            </header>

            <form action="#" method="post" class="login-form" novalidate>
                <div class="form-group">
                    <label for="username">E-posta</label>
                    <input type="email" id="username" class="username-input" placeholder="ornek@email.com" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" class="password-input" placeholder="••••••••" autocomplete="current-password" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Beni hatırla</span>
                    </label>
                    <a href="#" class="forgot-link">Şifremi unuttum</a>
                </div>

                <button type="submit" class="login-button">Giriş Yap</button>
            </form>

            <footer class="login-footer">
                <span>Hesabınız yok mu?</span>
                <a href="kayit.html">Kayıt ol</a>
            </footer>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
